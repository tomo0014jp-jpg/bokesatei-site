<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>お探しの品は見当たらねえ — AIボケ査定</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
<style>
  :root{--ink:#14110f;--paper:#ece3d3;--sumi:#d8cbb3;--shu:#c0392b;--shu-l:#e0503f;--gold:#cda349;--muted:#8a8073;--line:rgba(216,203,179,.16)}
  html,body{margin:0;padding:0}
  body{background:var(--ink);color:var(--paper);font-family:"Hiragino Mincho ProN","Yu Mincho","YuMincho","Noto Serif JP",serif;
       -webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
  .box{max-width:420px}
  .logo{font-size:24px;font-weight:700;letter-spacing:.14em}.logo .shu{color:var(--shu-l)}
  .code{font-size:72px;font-weight:700;color:var(--gold);margin:18px 0 6px;line-height:1}
  .msg{font-size:17px;color:var(--sumi);line-height:1.9;margin:0 0 26px}
  a{display:inline-block;margin:6px;padding:11px 22px;border-radius:999px;text-decoration:none;font-size:14px;letter-spacing:.06em}
  a.home{background:var(--shu);color:#fff}
  a.sub{border:1px solid var(--line);color:var(--gold)}
</style>
</head>
<body>
  <div class="box">
    <div class="logo">AI<span class="shu">ボケ</span>査定</div>
    <div class="code">404</div>
    <p class="msg">その品は蔵にゃ無えな。<br>番地を確かめて出直してきな。</p>
    <a class="home" href="/">表通りへ戻る →</a>
    <a class="sub" href="/#latest">最新の番付を見る</a>
  </div>
</body>
</html>
